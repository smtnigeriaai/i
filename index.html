 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMT Nigeria AI Assistant</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .chat-bubble-bot { border-radius: 2px 18px 18px 18px; }
    .chat-bubble-user { border-radius: 18px 2px 18px 18px; }
    .typing-dot { animation: bounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #smt-ai-header {
      background: linear-gradient(135deg, #0A1F44, #1E3A8A);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px 12px 0 0;
      font-family: Arial, sans-serif;
    }
    .smt-header-content {
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 10px;
    }
    .smt-logo {
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .smt-center-content {
      flex: 1;
      text-align: center;
    }
    .smt-company-name {
      font-size: 16px;

    }
    .smt-subtext {
      font-size: 10px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .smt-status {
      font-size: 10px;

      text-align: right;
      flex-shrink: 0;
    }
    .smt-website-btn {
      background: #00ff9d;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 10px;
      color: #0f1b2d;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .smt-website-btn:hover {
      background: #00cc7a;
    }
    .smt-admin-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #00ff9d;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      transition: background 0.2s ease;
    }
    .smt-admin-btn:hover {
      background: #00cc7a;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full flex flex-col" style="background-color: #0f1b2d;">
   <!-- Header --> <!-- 🔷 SMT AI Assistant Header -->
   <div id="smt-ai-header">
    <div class="smt-header-content">
     <div class="smt-logo"><img src="https://i.ibb.co/1WC9c6B/Blue-minimalist-building-logo-. -0000.jpg" alt="SMT Nigeria Logo" style="height: 40px; width: auto; object-fit: contain;" loading="lazy" onerror="console.error('Logo failed to load:', this.src); this.style.background='#1E3A8A'; this.alt='Logo unavailable';">
     </div>
     <div class="smt-center-content">
      <div class="smt-company-name">
       SMT Nigeria AI
      </div>
      <div class="smt-subtext">
       Your equipment, leasing &amp; power solution assistant
      </div>
     </div><button class="smt-website-btn" onclick="window.open('https://www.smt.network/africa/en/location/smt-nigeria-lagos-2/', '_blank', 'noopener,noreferrer')">🌐 Website</button>
    </div>
   </div><!-- Chat Area -->
   <main id="chat-area" class="flex-1 overflow-auto px-4 py-5 space-y-4">
    <!-- Welcome message inserted by JS -->
   </main><!-- Quick Actions -->
   <div id="quick-actions" class="px-4 pb-2 flex flex-wrap gap-2">
    <button onclick="sendQuick('I need construction equipment')" class="quick-btn text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105" style="background-color:#1a2a42;color:#f59e0b;border:1px solid #2a3f5f;">🏗️ Construction</button> <button onclick="sendQuick('I need mining equipment')" class="quick-btn text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105" style="background-color:#1a2a42;color:#f59e0b;border:1px solid #2a3f5f;">⛏️ Mining</button> <button onclick="sendQuick('I need a generator')" class="quick-btn text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105" style="background-color:#1a2a42;color:#f59e0b;border:1px solid #2a3f5f;">⚡ Power</button> <button onclick="sendQuick('I need spare parts')" class="quick-btn text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105" style="background-color:#1a2a42;color:#f59e0b;border:1px solid #2a3f5f;">🔧 Parts</button> <button onclick="sendQuick('I have budget constraints')" class="quick-btn text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105" style="background-color:#1a2a42;color:#f59e0b;border:1px solid #2a3f5f;">💰 Leasing</button>
   </div><!-- Input -->
   <form id="chat-form" class="px-4 pb-4 pt-2">
    <div class="flex gap-2 items-center rounded-2xl px-4 py-2" style="background-color:#1a2a42;border:1px solid #2a3f5f;">
     <input id="chat-input" type="text" placeholder="Type your message..." class="flex-1 bg-transparent outline-none text-white text-sm placeholder-gray-500" autocomplete="off"> <button type="submit" style="width:36px;height:36px;border-radius:50%;background-color:#f59e0b;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;">
      <svg width="16" height="16" viewbox="0 0 24 24" fill="none" stroke="#0f1b2d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
       <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg></button>
    </div>
   </form>
  </div>
  <script>
const defaultConfig = {
  company_name: 'SMT Nigeria',
  welcome_message: 'How can we help you today?',
  background_color: '#0f1b2d',
  surface_color: '#1a2a42',
  text_color: '#ffffff',
  primary_action: '#f59e0b',
  secondary_action: '#64b5f6',
  font_family: 'DM Sans',
  font_size: 14
};

let config = { ...defaultConfig };
const chatArea = document.getElementById('chat-area');

// AI Response Logic
const responses = {
  construction: "We can support your project with excavators, graders, loaders, and compactors depending on your scope.",
  mining: "We supply heavy-duty excavators, loaders, and dump trucks ideal for mining and quarry operations.",
  power: "We provide reliable generators and hybrid power solutions suitable for different business needs.",
  parts: "We supply genuine spare parts and provide full maintenance support for all our equipment.",
  leasing: "We offer flexible leasing and rent-to-own options to help you get started without full upfront payment.",
  default: "We provide construction equipment, mining machinery, power solutions, and flexible financing options tailored to your needs."
};

function classifyMessage(msg) {
  const m = msg.toLowerCase();
  if (m.includes('construct') || m.includes('road') || m.includes('building') || m.includes('excavat') || m.includes('grader')) return 'construction';
  if (m.includes('mining') || m.includes('quarry') || m.includes('crush') || m.includes('mine')) return 'mining';
  if (m.includes('generator') || m.includes('power') || m.includes('electric') || m.includes('energy')) return 'power';
  if (m.includes('spare') || m.includes('part') || m.includes('maintenance') || m.includes('service') || m.includes('repair')) return 'parts';
  if (m.includes('budget') || m.includes('capital') || m.includes('lease') || m.includes('rent') || m.includes('afford') || m.includes('finance') || m.includes('payment')) return 'leasing';
  return 'default';
}

function playBeep() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.frequency.value = 800;
  oscillator.type = 'sine';
  
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
  
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + 0.1);
}

function addMessage(text, isUser, includeButton = false) {
  const div = document.createElement('div');
  div.className = `fade-in flex ${isUser ? 'justify-end' : 'justify-start'} ${includeButton ? 'flex-col' : ''}`;
  const bubble = document.createElement('div');
  bubble.className = `${isUser ? 'chat-bubble-user' : 'chat-bubble-bot'} px-4 py-3 max-w-[85%] text-sm leading-relaxed whitespace-pre-line`;
  bubble.style.backgroundColor = isUser ? config.primary_action : config.surface_color;
  bubble.style.color = isUser ? config.background_color : config.text_color;
  if (!isUser) bubble.style.border = '1px solid #2a3f5f';
  bubble.textContent = text;
  div.appendChild(bubble);
  
  // Play beep sound for bot messages
  if (!isUser) playBeep();
  
  if (includeButton && !isUser) {
    const buttonContainer = document.createElement('div');
    buttonContainer.className = 'mt-2';
    const btn = document.createElement('button');
    btn.onclick = openAdminChat;
    btn.className = 'text-xs px-3 py-1.5 rounded-full font-medium transition-all hover:scale-105';
    btn.style.backgroundColor = '#00ff9d';
    btn.style.color = '#000';
    btn.style.border = 'none';
    btn.style.cursor = 'pointer';
    btn.textContent = '👉 Chat with Admin';
    buttonContainer.appendChild(btn);
    div.appendChild(buttonContainer);
  }
  
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'fade-in flex justify-start';
  div.innerHTML = `<div class="chat-bubble-bot px-4 py-3 flex gap-1.5 items-center" style="background-color:${config.surface_color};border:1px solid #2a3f5f;">
    <span class="typing-dot w-2 h-2 rounded-full" style="background:${config.secondary_action}"></span>
    <span class="typing-dot w-2 h-2 rounded-full" style="background:${config.secondary_action}"></span>
    <span class="typing-dot w-2 h-2 rounded-full" style="background:${config.secondary_action}"></span>
  </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function handleUserMessage(text) {
  addMessage(text, true);
  showTyping();
  setTimeout(() => {
    removeTyping();
    const category = classifyMessage(text);
    addMessage(responses[category], false, true);
  }, 800 + Math.random() * 600);
}

function sendQuick(text) {
  handleUserMessage(text);
}

document.getElementById('chat-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  handleUserMessage(text);
});

// Welcome
function showWelcome() {
  chatArea.innerHTML = '';
  const welcome = config.welcome_message || defaultConfig.welcome_message;
  const name = config.company_name || defaultConfig.company_name;
  addMessage(`Welcome to ${name}! ${welcome}\n\nWe provide construction equipment, mining machinery, power solutions, spare parts, and flexible financing. Select an option below or type your question.`, false);
}

showWelcome();

// Open Admin Chat
function openAdminChat() {
  window.open("https://wa.me/234XXXXXXXXXX", "_blank");
}

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (cfg) => {
    config = { ...defaultConfig, ...cfg };
    document.getElementById('header-title').textContent = config.company_name || defaultConfig.company_name;
    document.getElementById('app-wrapper').style.backgroundColor = config.background_color;
    const font = config.font_family || defaultConfig.font_family;
    document.querySelectorAll('*').forEach(el => { el.style.fontFamily = `${font}, sans-serif`; });
  },
  mapToCapabilities: (cfg) => ({
    recolorables: [
      { get: () => cfg.background_color || defaultConfig.background_color, set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => cfg.surface_color || defaultConfig.surface_color, set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => cfg.text_color || defaultConfig.text_color, set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => cfg.primary_action || defaultConfig.primary_action, set: (v) => { cfg.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
      { get: () => cfg.secondary_action || defaultConfig.secondary_action, set: (v) => { cfg.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => cfg.font_family || defaultConfig.font_family, set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => cfg.font_size || defaultConfig.font_size, set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (cfg) => new Map([
    ['company_name', cfg.company_name || defaultConfig.company_name],
    ['welcome_message', cfg.welcome_message || defaultConfig.welcome_message]
  ])
});

lucide.createIcons();
</script>
